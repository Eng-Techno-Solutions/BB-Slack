<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BB Slack</title>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    [data-type="list-item"]:hover { background-color: rgba(18, 100, 163, 0.15) !important; }
    [data-type="action-item"]:hover { background-color: rgba(255, 255, 255, 0.08) !important; }
    [data-type="message"]:hover { background-color: rgba(255, 255, 255, 0.03) !important; }
    [data-type="list-item"], [data-type="action-item"], [data-type="message"] { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
